<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
 lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — TheMart</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/wishlist.css}">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>


  <div th:replace="~{fragments/layout :: topbar}"></div>
  <div th:replace="~{fragments/layout :: header}"></div>
 
<!-- Wishlist Content -->
<div class="wishlist-wrapper">
  <h2 class="wishlist-title">My Wishlist</h2>
 
  <!-- Empty State -->
  <div th:if="${#lists.isEmpty(wishlistItems)}" class="empty-wishlist">
    <div class="empty-icon">❤️</div>
    <h3>Your wishlist is empty!</h3>
    <p>Save items you love and come back to them anytime.</p>
    <a th:href="@{/shop}" class="btn-browse">Browse Products →</a>
  </div>
 
  <!-- Wishlist Table -->
  <div th:unless="${#lists.isEmpty(wishlistItems)}">
    <table class="wishlist-table">
      <thead>
        <tr>
          <th style="width:45%">PRODUCT</th>
          <th style="width:20%">PRICE</th>
          <th style="width:15%">STOCK STATUS</th>
          <th style="width:20%"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="item : ${wishlistItems}">
 
          <!-- Product -->
          <td>
            <a th:href="@{/product/{id}(id=${item.product.id})}"
               style="text-decoration:none;color:inherit;">
              <div class="product-cell">
                <img alt="wishlist-img" th:src="${item.product.imageUrl} ?: '/images/placeholder.jpg'"
                     th:alt="${item.product.name}"/>
                <span class="product-name" th:text="${item.product.name}">Product</span>
              </div>
            </a>
          </td>
 
          <!-- Price -->
          <!-- <td>
            <div class="price-cell">
              <span class="current" th:text="'₹' + ${item.product.price}">₹0</span>
              <span class="original"
                    th:if="${item.product.originalPrice != null}"
                    th:text="'₹' + ${item.product.originalPrice}"></span>
            </div>
          </td> -->

          <!-- Price -->
<td>
  <div class="price-cell">
    <span class="current"
          th:text="'$' + ${#numbers.formatDecimal(item.product.price, 1, 2)}">$0.00</span>
    <span class="original"
          th:if="${item.product.originalPrice != null}"
          th:text="'$' + ${#numbers.formatDecimal(item.product.originalPrice, 1, 2)}"></span>
  </div>
</td>
 
          <!-- Stock Status -->
          <td>
            <span th:if="${item.product.stockQuantity != null and item.product.stockQuantity > 0}"
                  class="badge-instock">In Stock</span>
            <span th:unless="${item.product.stockQuantity != null and item.product.stockQuantity > 0}"
                  class="badge-outofstock">Out of Stock</span>
          </td>
 
          <!-- Actions -->
          <td>
            <div class="actions-cell">
              <!-- Add to Cart -->
              <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="productId" th:value="${item.product.id}"/>
                <input type="hidden" name="quantity" value="1"/>
                <button type="submit" class="btn-add-cart"
                        th:disabled="${item.product.stockQuantity == null or item.product.stockQuantity <= 0}">
                  Add to Cart
                </button>
              </form>
 
              <!-- Remove -->
              <form th:action="@{/wishlist/remove/{id}(id=${item.id})}" method="post">
                <button type="submit" class="btn-remove-wish" title="Remove">
                  <i class="fas fa-times"></i>
                </button>
              </form>
            </div>
          </td>
 
        </tr>
      </tbody>
    </table>
 
    
   
  </div>
</div>


  <!-- brand directory -->
  <div th:replace="~{fragments/layout :: brand-directory}"></div>
<!-- ==================footer==================================== -->
<div th:replace="~{fragments/layout :: footer}"></div>



</body>
</html>
