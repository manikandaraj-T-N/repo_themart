
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Shop - TheMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <link rel="stylesheet" th:href="@{/css/shop.css}"/>
</head>
<body>

  <div th:replace="~{fragments/layout :: topbar}"></div>
  <div th:replace="~{fragments/layout :: header}"></div>

  
  <!-- Main Shell -->
  <div class="shop-shell">

   

  <!-- ══ MAIN CONTENT ══ -->
<main class="shop-main">

  <!-- Gender / Category Tab Bar -->
  <div class="shop-tab-bar">
  <div class="shop-tabs">
    <a th:href="@{/shop}"
       class="shop-tab"
       th:classappend="${gender == null} ? ' active'">
      All Products
    </a>
    <a th:href="@{/shop(gender='womens')}"
       class="shop-tab"
       th:classappend="${gender == 'womens'} ? ' active'">
      Women
    </a>
    <a th:href="@{/shop(gender='mens')}"
       class="shop-tab"
       th:classappend="${gender == 'mens'} ? ' active'">
      Men
    </a>
    <a th:href="@{/shop(gender='children')}"
       class="shop-tab"
       th:classappend="${gender == 'children'} ? ' active'">
      Children
    </a>
  </div>
  <div class="shop-tab-actions">
    <button class="tab-action-btn">
      <i class="fas fa-sliders-h"></i> Filter
    </button>
    <button class="tab-action-btn">
      <i class="fas fa-search"></i> Search
    </button>
  </div>
</div>

 
  <div th:if="${search != null and !#strings.isEmpty(search)}"
       style="background:#fff0f6; border-left:4px solid #e91e8c;
              padding:12px 20px; margin-bottom:20px;
              border-radius:6px; font-size:14px; color:#333;">
    <i class="fas fa-search" style="color:#e91e8c;"></i>
    Showing <strong th:text="${totalProducts}">0</strong> results for
    <strong th:text="'&quot;' + ${search} + '&quot;'">"keyword"</strong>
    <a th:href="@{/shop}" style="margin-left:12px; color:#e91e8c; font-size:13px;">
      <i class="fas fa-times"></i> Clear
    </a>
  </div>

  <!-- Products Grid -->
  <div class="products-grid" id="productsGrid">

    <!-- Empty state -->
    <div class="empty-state" th:if="${#lists.isEmpty(products)}">
      <i class="fas fa-box-open"></i>
      <h3>No products found</h3>
      <p>Try adjusting your filters or browse all products.</p>
      <a th:href="@{/shop}">Browse All</a>
    </div>

    <!-- Product Cards -->
    <div class="product-card" th:each="product : ${products}">

      <!-- Badges -->
      <div class="badge-wrap">
        <span class="badge badge-oos" th:if="${!product.inStock}">Out of Stock</span>
        <span class="badge badge-sale"
              th:if="${product.discountPercentage != null and product.discountPercentage > 0}"
              th:text="'-' + ${product.discountPercentage} + '%'">-20%</span>
        <span class="badge badge-new" th:if="${product.isFeatured}">Featured</span>
      </div>

      <!-- Image -->
      <div class="product-img-wrapper">
        <a th:href="@{/product/{id}(id=${product.id})}">
          <img th:src="${product.imageUrl}" th:alt="${product.name}"
               class="product-img" alt="product"/>
        </a>

        <!-- Actions -->
        <div class="card-actions">
          <form th:action="@{/wishlist/add}" method="post">
            <input type="hidden" name="productId" th:value="${product.id}"/>
            <button type="submit" class="action-btn" title="Wishlist">
              <i class="far fa-heart"></i>
            </button>
          </form>
        </div>

        <!-- Quick View -->
        <div class="card-hover-overlay">
          <a th:href="@{/product/{id}(id=${product.id})}" class="view-cart-btn">
            Quick View
          </a>
        </div>
      </div>

      <!-- Info -->
      <div class="product-info">
        <div class="product-category-tag"
             th:text="${product.category != null} ? ${product.category.name} : ''"></div>
        <div class="product-name" th:text="${product.name}">Product Name</div>

        <!-- Stars -->
        <div class="star-row">
          <th:block th:if="${product.rating != null}"
                    th:each="s : ${#numbers.sequence(1,5)}">
            <i th:class="${s <= product.rating.intValue()} ? 'fas fa-star' : 'far fa-star'"></i>
          </th:block>
          <th:block th:if="${product.rating == null}">
            <i class="far fa-star"></i><i class="far fa-star"></i>
            <i class="far fa-star"></i><i class="far fa-star"></i>
            <i class="far fa-star"></i>
          </th:block>
        </div>

        <!-- Price -->
        <div class="product-price">
          <span class="price-current" th:text="'₹' + ${product.price}">₹999</span>
          <span class="price-old" th:if="${product.originalPrice != null}"
                th:text="'₹' + ${product.originalPrice}">₹1299</span>
        </div>

        <!-- Footer -->
        <div class="product-footer">
          <form th:action="@{/cart/add}" method="post">
            <input type="hidden" name="productId" th:value="${product.id}"/>
            <input type="hidden" name="quantity" value="1"/>
            <button type="submit" class="add-cart-btn"
                    th:disabled="${!product.inStock}" title="Add to Cart">
              <i class="fas fa-shopping-bag"></i>
            </button>
          </form>
        </div>

      </div>
    </div>

  </div>


<!-- Pagination -->
<div class="shop-pagination" th:if="${totalPages > 1}">

  <!-- Prev -->
  <a th:href="@{/shop(page=${currentPage - 1},
                      gender=${gender},
                      category=${selectedCategory},
                      search=${search},
                      sort=${sort},
                      maxPrice=${maxPrice},
                      rating=${selectedRating},
                      tag=${activeTag})}"
     class="page-btn"
     th:classappend="${currentPage == 0} ? ' disabled'">
    <i class="fas fa-chevron-left"></i> Prev
  </a>

  <!-- First page -->
  <a th:if="${currentPage > 2}"
     th:href="@{/shop(page=0, gender=${gender}, category=${selectedCategory},
                      search=${search}, sort=${sort}, maxPrice=${maxPrice},
                      rating=${selectedRating}, tag=${activeTag})}"
     class="page-num">1</a>

  <span th:if="${currentPage > 3}" class="page-dots">...</span>

  <!-- Pages around current -->
  <th:block th:each="i : ${#numbers.sequence(
      (currentPage > 2) ? (currentPage - 2) : 0,
      (currentPage + 2 < totalPages - 1) ? (currentPage + 2) : (totalPages - 1))}">
    <a th:href="@{/shop(page=${i},
                        gender=${gender},
                        category=${selectedCategory},
                        search=${search},
                        sort=${sort},
                        maxPrice=${maxPrice},
                        rating=${selectedRating},
                        tag=${activeTag})}"
       class="page-num"
       th:classappend="${i == currentPage} ? ' active'"
       th:text="${i + 1}">1</a>
  </th:block>

  <span th:if="${currentPage + 3 < totalPages - 1}" class="page-dots">...</span>

  <!-- Last page -->
  <a th:if="${currentPage < totalPages - 3}"
     th:href="@{/shop(page=${totalPages - 1}, gender=${gender},
                      category=${selectedCategory}, search=${search},
                      sort=${sort}, maxPrice=${maxPrice},
                      rating=${selectedRating}, tag=${activeTag})}"
     class="page-num"
     th:text="${totalPages}">N</a>

  <!-- Next -->
  <a th:href="@{/shop(page=${currentPage + 1},
                      gender=${gender},
                      category=${selectedCategory},
                      search=${search},
                      sort=${sort},
                      maxPrice=${maxPrice},
                      rating=${selectedRating},
                      tag=${activeTag})}"
     class="page-btn"
     th:classappend="${currentPage == totalPages - 1} ? ' disabled'">
    Next <i class="fas fa-chevron-right"></i>
  </a>

</div>

<!-- Page info -->
<div class="shop-page-info" th:if="${totalPages > 1}"
     th:text="'Showing page ' + ${currentPage + 1} + ' of ' + ${totalPages} + ' — ' + ${totalProducts} + ' total products'">
</div>

</main>
  </div>

  <!-- Instagram Section -->
  <section class="insta-section">
    <h2 class="insta-title">Follow Us On <span>Instagram</span></h2>
    <div class="insta-grid">
      <a href="https://instagram.com/themart" target="_blank" class="insta-item">
        <img th:src="@{/images/insta1.png}" alt="insta 1"/>
        <div class="insta-overlay"><i class="fab fa-instagram"></i></div>
      </a>
      <a href="https://instagram.com/themart" target="_blank" class="insta-item insta-wide">
        <img th:src="@{/images/insta2.png}" alt="insta 2"/>
        <div class="insta-overlay"><i class="fab fa-instagram"></i></div>
      </a>
      <a href="https://instagram.com/themart" target="_blank" class="insta-item">
        <img th:src="@{/images/insta3.png}" alt="insta 3"/>
        <div class="insta-overlay"><i class="fab fa-instagram"></i></div>
      </a>
      <a href="https://instagram.com/themart" target="_blank" class="insta-item insta-wide">
        <img th:src="@{/images/insta4.png}" alt="insta 4"/>
        <div class="insta-overlay"><i class="fab fa-instagram"></i></div>
      </a>
      <a href="https://instagram.com/themart" target="_blank" class="insta-item">
        <img th:src="@{/images/insta5.png}" alt="insta 5"/>
        <div class="insta-overlay"><i class="fab fa-instagram"></i></div>
      </a>
      <a href="https://instagram.com/themart" target="_blank" class="insta-item">
        <img th:src="@{/images/insta6.png}" alt="insta 6"/>
        <div class="insta-overlay"><i class="fab fa-instagram"></i></div>
      </a>
    </div>
  </section>

  <div th:replace="~{fragments/layout :: brand-directory}"></div>
  <div th:replace="~{fragments/layout :: footer}"></div>

  <script>
    // Sort
    function applySort(value) {
      const url = new URL(window.location.href);
      url.searchParams.set('sort', value);
      window.location.href = url.toString();
    }

    // Price
    function updatePrice(val) {
      document.getElementById('priceVal').textContent = '₹' + val;
    }
    function applyPrice() {
      const val = document.getElementById('priceRange').value;
      const url = new URL(window.location.href);
      url.searchParams.set('maxPrice', val);
      window.location.href = url.toString();
    }

    // Rating
    function applyRating(val) {
      const url = new URL(window.location.href);
      url.searchParams.set('rating', val);
      window.location.href = url.toString();
    }

    // Sidebar toggle
    function toggleFilter(header) {
      header.classList.toggle('open');
      const body = header.nextElementSibling;
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
    }

    // View toggle
    function setView(mode) {
      const grid = document.getElementById('productsGrid');
      const gridBtn = document.getElementById('gridBtn');
      const listBtn = document.getElementById('listBtn');
      if (mode === 'list') {
        grid.classList.add('list-view');
        listBtn.classList.add('active');
        gridBtn.classList.remove('active');
      } else {
        grid.classList.remove('list-view');
        gridBtn.classList.add('active');
        listBtn.classList.remove('active');
      }
    }

    // Quick view placeholder
    function quickView(id) {
      window.location.href = '/product/' + id;
    }
  </script>

</body>
</html>
