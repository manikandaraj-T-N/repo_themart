<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Shop - TheMart</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <link rel="stylesheet" th:href="@{/css/home.css}"/>
   
  <link rel="stylesheet" th:href="@{/css/shop.css}"/>


</head>
<body>

 <div th:replace="~{fragments/layout :: topbar}"></div>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="shop-wrapper">

  <!-- ===== MAIN CONTENT ===== -->
  <main class="shop-main">

    <!-- Sort Bar -->
   <!-- Sort Bar -->
<div class="sort-bar">
  <div class="sort-left">
    <span th:text="${totalProducts} + ' Products found'">24 Products found</span>
    <!-- Show active category filter -->
    <span th:if="${selectedCategory != null}" style="margin-left:10px; color:#FF8F9C;">
      in <strong th:text="${selectedCategory}"></strong>
    </span>
  </div>
  <div class="sort-right">
    <label>Sort by:</label>
    <select onchange="applySort(this.value)">
      <option value="latest"    th:selected="${sort == 'latest'}">Latest</option>
      <option value="price-low" th:selected="${sort == 'price-low'}">Price: Low to High</option>
      <option value="price-high"th:selected="${sort == 'price-high'}">Price: High to Low</option>
      <option value="rating"    th:selected="${sort == 'rating'}">Top Rated</option>
    </select>
  </div>
</div>
    <!-- Products Grid -->
    <div class="products-grid">
      <div class="product-card" th:each="product : ${products}">

  <!-- Out of Stock Badge -->
  <div class="out-of-stock-badge" th:if="${!product.inStock}">Out of Stock</div>

  <!-- Image Area -->
  <div class="product-img-wrapper">
    <a th:href="@{/product/{id}(id=${product.id})}">
      <img alt="product image" th:src="${product.imageUrl}"
           th:alt="${product.name}"
           class="product-img"/>
    </a>

    <!-- Wishlist + Quick View — top right -->
    <div class="card-actions">
      <form th:action="@{/wishlist/add}" method="post">
        <input type="hidden" name="productId" th:value="${product.id}"/>
        <button type="submit" class="action-btn" title="Add to Wishlist">
          <i class="far fa-heart"></i>
        </button>
      </form>
      <button class="action-btn" title="Quick View"
              th:onclick="'quickView(' + ${product.id} + ')'">
        <i class="far fa-eye"></i>
      </button>
    </div>

    <!-- Hover overlay: description + View Cart -->
    <div class="card-hover-overlay">
      <p class="hover-desc"
         th:text="${product.description} ?: 'Fresh organic product.'">
        Fresh organic product.
      </p>
      <a th:href="@{/cart}" class="view-cart-btn">
        View Cart <i class="fas fa-arrow-right"></i>
      </a>
    </div>

    <!-- Rating badge — bottom right of image -->
    <div class="rating-badge" th:if="${product.rating != null}">
      <i class="fas fa-star"></i>
      <span th:text="${product.rating}">4.5</span>
    </div>
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <div class="product-name" th:text="${product.name}">Product Name</div>
    <div class="product-price">
      <span class="price-current"
            th:text="'₹' + ${product.price} + '/' + ${product.unit}">₹199/kg</span>
      <span class="price-old"
            th:if="${product.originalPrice != null}"
            th:text="'₹' + ${product.originalPrice}">₹320</span>
    </div>

    <!-- Stars + Cart button on same row -->
    <div class="product-footer">
      <div class="star-row">
        <th:block th:if="${product.rating != null}"
                  th:each="s : ${#numbers.sequence(1,5)}">
          <i th:class="${s <= product.rating.intValue()} ? 'fas fa-star' : 'far fa-star'"></i>
        </th:block>
        <th:block th:if="${product.rating == null}">
          <i class="far fa-star"></i>
          <i class="far fa-star"></i>
          <i class="far fa-star"></i>
          <i class="far fa-star"></i>
          <i class="far fa-star"></i>
        </th:block>
      </div>

      <!-- Add to Cart -->
      <form th:action="@{/cart/add}" method="post">
        <input type="hidden" name="productId" th:value="${product.id}"/>
        <input type="hidden" name="quantity" value="1"/>
        <button type="submit" class="add-cart-btn"
                th:disabled="${!product.inStock}" title="Add to Cart">
          <i class="fas fa-shopping-bag"></i>
        </button>
      </form>
    </div>
  </div>

</div>

    </div>

  </main>

</div>

<!-- ===== INSTAGRAM SECTION ===== -->
<section class="insta-section">
  <h2 class="insta-title">Follow Us On Instagram</h2>
  <div class="insta-grid">

    <a href="https://instagram.com/themart" target="_blank" class="insta-item">
      <img th:src="@{/images/insta1.png}" alt="Instagram post 1"/>
      <div class="insta-overlay">
        <i class="fab fa-instagram"></i>
      </div>
    </a>

    <a href="https://instagram.com/themart" target="_blank" class="insta-item insta-wide">
      <img th:src="@{/images/insta2.png}" alt="Instagram post 2"/>
      <div class="insta-overlay">
        <i class="fab fa-instagram"></i>
      </div>
    </a>

    <a href="https://instagram.com/themart" target="_blank" class="insta-item">
      <img th:src="@{/images/insta3.png}" alt="Instagram post 3"/>
      <div class="insta-overlay">
        <i class="fab fa-instagram"></i>
      </div>
    </a>

    <a href="https://instagram.com/themart" target="_blank" class="insta-item insta-wide">
      <img th:src="@{/images/insta4.png}" alt="Instagram post 4"/>
      <div class="insta-overlay">
        <i class="fab fa-instagram"></i>
      </div>
    </a>

    <a href="https://instagram.com/themart" target="_blank" class="insta-item">
      <img th:src="@{/images/insta5.png}" alt="Instagram post 5"/>
      <div class="insta-overlay">
        <i class="fab fa-instagram"></i>
      </div>
    </a>

    <a href="https://instagram.com/themart" target="_blank" class="insta-item">
      <img th:src="@{/images/insta6.png}" alt="Instagram post 6"/>
      <div class="insta-overlay">
        <i class="fab fa-instagram"></i>
      </div>
    </a>

  </div>
</section>

<div th:replace="~{fragments/layout :: brand-directory}"></div>

<div th:replace="~{fragments/layout :: footer}"></div>


<script>
  function applySort(value) {
    const url = new URL(window.location.href);
    url.searchParams.set('sort', value);
    window.location.href = url.toString();
  }
</script>
</body>
</html>
